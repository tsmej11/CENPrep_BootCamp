let questions = [];
let qIndex = 0;
let score = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startPractice() {
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

questions = shuffle(BANK).slice(0,10);
loadQuestion();
}

function loadQuestion(){
let q=questions[qIndex];

document.getElementById("qText").innerHTML=(qIndex+1)+". "+q.q;

let html="";

q.o.forEach((opt,i)=>{
html+=`<button class="choice" onclick="answer(${i})">${opt}</button>`
})

document.getElementById("choices").innerHTML=html;
}

function answer(i){
let q=questions[qIndex];
let buttons=document.querySelectorAll(".choice")

if(["A","B","C","D"][i]===q.a){
buttons[i].classList.add("correct")
score++
}else{
buttons[i].classList.add("incorrect")
buttons[["A","B","C","D"].indexOf(q.a)].classList.add("correct")
}
}

function next(){
qIndex++
if(qIndex>=questions.length){
alert("Score: "+score+"/10")
location.reload()
return
}
loadQuestion()
}
